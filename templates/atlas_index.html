<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>State atlas — exposure_triangle_rv2459</title>
  <style>
    body { background: #0a0a0a; color: #eee; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 1.5rem; }
    h1 { margin: 0 0 0.3rem; }
    header { margin-bottom: 1.5rem; }
    header p { opacity: 0.65; margin: 0; font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(540px, 1fr)); gap: 1.5rem; }
    .card { background: #151515; border: 1px solid #2a2a2a; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
    .card header { padding: 0.7rem 1rem; border-bottom: 1px solid #2a2a2a; margin: 0; }
    .card h2 { margin: 0; font-size: 1rem; }
    .card .slug { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.75rem; opacity: 0.45; }
    .card .desc { font-size: 0.83rem; opacity: 0.7; margin-top: 0.3rem; }
    .card iframe { width: 100%; height: 480px; border: 0; background: #111; }
    .card footer { padding: 0.5rem 1rem; border-top: 1px solid #2a2a2a; font-size: 0.8rem; opacity: 0.55; }
    .card footer a { color: #7af; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>State atlas</h1>
    <p>Every meaningfully-unique UI state, side by side. Each tile is a live iframe rendered from the real templates with a synthesized context. Not wired to session / DB.</p>
  </header>
  <div class="grid">
    {% for slug, title, desc in frames %}
    <div class="card">
      <header>
        <div class="slug">{{ slug }}</div>
        <h2>{{ title }}</h2>
        <div class="desc">{{ desc }}</div>
      </header>
      <iframe src="/_atlas/frame/{{ slug }}?reveal=off" loading="lazy" title="{{ title }}"></iframe>
      <footer><a href="/_atlas/frame/{{ slug }}" target="_blank">open alone ↗</a></footer>
    </div>
    {% endfor %}
  </div>
</body>
</html>
